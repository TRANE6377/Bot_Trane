services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_PATH=/app/data/bot_data.db
      - TELETHON_SESSION=/app/data/user_session
    volumes:
      - ./data:/app/data
    # NOTE: Apple Calendar and Reminders do NOT work inside Docker.
    # They require macOS native access (osascript).
    # To use Calendar/Reminders integration, run the bot natively:
    #   python bot.py
